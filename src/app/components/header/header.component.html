<!-- ================= TOP BLACK BAR ================= -->
<div class="bg-black text-white py-2 border-bottom border-secondary-subtle d-none d-md-flex">
  <div class="container d-flex justify-content-between align-items-center flex-wrap">

    <!-- Social Icons -->
    <div class="d-flex align-items-center gap-3 small">
      <i class="bi bi-facebook"></i>
      <i class="bi bi-linkedin"></i>
      <i class="bi bi-twitter"></i>
      <i class="bi bi-envelope"></i>
    </div>

    <!-- Top Links -->
    <div class="d-flex align-items-center gap-2 small top-links flex-wrap justify-content-center">
      <span>Introduce</span>
      <span>•</span>
      <span>Partner Incentives</span>
      <span>•</span>
      <span>Promotion</span>
      <span>•</span>
      <span>Contact</span>
      <span>•</span>
      <span>Frequently asked questions</span>
    </div>

  </div>
</div>

<!-- ================= MAIN HEADER ================= -->
<div class="bg-black text-white py-3">
  <div class="container">

    <!-- MOBILE HEADER -->
    <div class="d-flex d-lg-none justify-content-between align-items-center">

      <!-- Hamburger -->
      <i class="bi bi-list fs-3"></i>

      <!-- Logo -->
      <h5 class="mb-0 fw-bold">Exclusive</h5>

      <!-- Icons -->
      <div class="d-flex align-items-center gap-3">
        <i class="bi bi-search"></i>
        <i class="bi bi-heart"></i>
        <div class="position-relative">
          <i class="bi bi-cart3"></i>
          <span class="cart-badge">{{ cartCount }}</span>
        </div>
      </div>
    </div>

    <!-- DESKTOP HEADER -->
    <div class="row align-items-center d-none d-lg-flex gy-3">

      <!-- Logo -->
      <div class="col-lg-3">
        <h3 class="fw-bold mb-0">Exclusive</h3>
      </div>

      <!-- Search -->
      <div class="col-lg-6">
        <div class="d-flex">
          <div class="input-group">
          <input type="text"
            class="form-control border-0"
            [(ngModel)]="searchText"
            placeholder="What are you looking for?" />

          <select class="form-select-sm bg-body-secondary" [(ngModel)]="selectedCategory">
            <option value="">Category</option>
            <option value="Technology">Technology</option>
            <option value="Watch">Watch</option>
            <option value="Cosmetics">Cosmetics</option>
            <option value="Real Estate">Real Estate</option>
            <option value="Luxury Food">Luxury Food</option>
          </select>
          </div>

          <button class="btn btn-success px-4 mx-2" (click)="onSearch()">
            Search
          </button>
        </div>
      </div>

      <!-- Icons -->
      <div class="col-lg-3 text-end">
        <i class="bi bi-heart me-3"></i>
        <div class="d-inline-block position-relative">
          <i class="bi bi-cart3"></i>
          <span class="cart-badge">{{ cartCount }}</span>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ================= BOTTOM NAV ================= -->
<nav class="bg-light border-top border-bottom mb-4 d-none d-lg-flex">
  <div class="container">
    <div class="row align-items-center py-3">

      <!-- Left Category -->
      <div class="col-lg-3 d-flex align-items-center justify-content-center justify-content-lg-start mb-2 mb-lg-0">
        <div class="d-flex align-items-center gap-2 nav-hover cursor-pointer">
          <i class="bi bi-list-ul"></i>
          <span class="fw-medium small">Category</span>
          <i class="bi bi-chevron-down small"></i>
        </div>
      </div>

      <!-- Center Nav -->
      <div class="col-lg-6">
        <div class="d-flex justify-content-center align-items-center gap-4 flex-wrap nav-center">
          <span class="nav-link-custom active-link">Home</span>

          <div class="d-flex align-items-center gap-1 nav-link-custom">
            <span>New Product</span>
            <i class="bi bi-chevron-down small"></i>
          </div>

          <div class="d-flex align-items-center gap-2 nav-link-custom">
            <span>Promotion</span>
            <span class="badge hot-badge">HOT</span>
          </div>
        </div>
      </div>

      <!-- Right Nav -->
      <div class="col-lg-3">
        <div class="d-flex justify-content-center justify-content-lg-end align-items-center gap-4 flex-wrap">

          <div class="d-flex align-items-center gap-2 nav-link-custom">
            <i class="bi bi-truck"></i>
            <span>Track Your Order</span>
          </div>

          <div class="d-flex align-items-center gap-2 nav-link-custom">
            <i class="bi bi-person"></i>
            <span>Sign In/Register</span>
          </div>

        </div>
      </div>

    </div>
  </div>
</nav>
